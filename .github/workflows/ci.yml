name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .
      - run: python tests_pkg/test_cli.py
      - run: python tests_pkg/test_fusion.py
      - run: python tests/test_harness.py
      # dogfood: costwright sobre sí mismo no debe encontrar runaways
      - run: costwright check src --fail-on reject
